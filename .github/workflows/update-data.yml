name: Update market data

on:
  schedule:
    # Mercredi et samedi à 8h UTC
    - cron: '0 8 * * 3,6'
  workflow_dispatch: # déclenchement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ETF flows (Farside — quotidien)
        continue-on-error: true
        run: python fetch_etf_flows.py

      - name: Fetch COT data (CFTC — vendredi uniquement)
        # Le fichier COT ne change qu'une fois par semaine mais on tente tous les jours
        # fetch_cot.py gère lui-même si les données sont déjà à jour
        run: python fetch_cot.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save our freshly computed data files before pull
          cp data/etf_flows.json /tmp/etf_flows_new.json
          cp data/cot_data.json /tmp/cot_data_new.json
          # Pull latest (other parallel runs may have pushed)
          git pull --rebase origin master || true
          # Restore our fresh computed files (overwrite whatever was pulled)
          cp /tmp/etf_flows_new.json data/etf_flows.json
          cp /tmp/cot_data_new.json data/cot_data.json
          git add data/etf_flows.json data/cot_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update market data $(date -u '+%Y-%m-%d')"
            git push || (git pull --rebase origin master && git push)
          fi
