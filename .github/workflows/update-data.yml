name: Update market data

on:
  schedule:
    # Tous les jours à 8h UTC (le carnet de bord retail a besoin d'un point quotidien)
    - cron: '0 8 * * *'
  workflow_dispatch: # déclenchement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch ETF flows (Farside — quotidien)
        continue-on-error: true
        run: python fetch_etf_flows.py

      - name: Fetch COT data (CFTC — hebdomadaire)
        # Le fichier COT ne change qu'une fois par semaine (rapport du vendredi)
        # continue-on-error: évite de bloquer le commit ETF si CFTC est indisponible
        continue-on-error: true
        run: python fetch_cot.py

      - name: Fetch corporate BTC treasury holdings (CoinGecko)
        continue-on-error: true
        run: python fetch_treasury.py

      - name: Log daily retail positioning + BTC price (carnet de bord)
        continue-on-error: true
        run: python fetch_retail_history.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save freshly computed data files before pull (only if they exist)
          [ -f data/etf_flows.json     ] && cp data/etf_flows.json     /tmp/etf_flows_new.json     || true
          [ -f data/cot_data.json      ] && cp data/cot_data.json      /tmp/cot_data_new.json      || true
          [ -f data/treasury_data.json ] && cp data/treasury_data.json /tmp/treasury_data_new.json || true
          [ -f data/retail_history.json] && cp data/retail_history.json /tmp/retail_history_new.json || true
          # Pull latest remote changes (handles remote-ahead situations)
          git pull --rebase origin master || true
          # Restore our fresh computed files (overwrite whatever was pulled)
          [ -f /tmp/etf_flows_new.json      ] && cp /tmp/etf_flows_new.json      data/etf_flows.json      || true
          [ -f /tmp/cot_data_new.json       ] && cp /tmp/cot_data_new.json       data/cot_data.json       || true
          [ -f /tmp/treasury_data_new.json  ] && cp /tmp/treasury_data_new.json  data/treasury_data.json  || true
          [ -f /tmp/retail_history_new.json ] && cp /tmp/retail_history_new.json data/retail_history.json || true
          # Stage only files that actually exist
          git add $(ls data/etf_flows.json data/cot_data.json data/treasury_data.json data/retail_history.json 2>/dev/null) 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update market data $(date -u '+%Y-%m-%d')"
            git push || (git pull --rebase origin master && git push)
          fi
